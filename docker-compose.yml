version: '3.8'

services:
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/suraksha_maps
      - JWT_SECRET=dev-secret-change-me
      - DEMO_MODE=false
      - OCR_ENGINE=auto
      - OCR_CLOUD_PROVIDER=aws
      - AWS_TEXTRACT_REGION=ap-south-1
      - OCR_TESSERACT_MIN_CONFIDENCE=0.60
      - OCR_CLOUD_MIN_CONFIDENCE=0.75
      - OCR_MAX_PAGES=200
      - OCR_LARGE_DOC_SAMPLE_RATE=5
      - OCR_DPI=300
      - OCR_PARALLEL_WORKERS=4
      - OCR_RETRY_ATTEMPTS=3
      - OCR_RETRY_BACKOFF=2
    depends_on:
      - mongodb
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  mongo_data:
